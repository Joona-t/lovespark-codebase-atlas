ude Code skills. Built because agent swarms kept discovering repeatable workflows during execution that got written inline into reports and then forgotten \u2014 agents had no way to codify reusable patterns as skills without stopping everything. Now any agent can forge the skill it needs on the fly.","version":"","audit_mode":"","has_audit_meta":false,"audit_url":"audit/claude-forge-skill.html","audited_at":""},{"name":"Joona-t","tier":3,"url":"https://github.com/Joona-t/Joona-t","visibility":"public","archived":false,"lang":"","loc":0,"files":0,"stars":0,"pushed_at":"2026-04-05T03:58:41Z","audited":false,"tldr":"GitHub profile README","version":"","audit_mode":"","has_audit_meta":false,"audit_url":"audit/Joona-t.html","audited_at":""},{"name":"Full-Power-Folders","tier":3,"url":"https://github.com/Joona-t/Full-Power-Folders","visibility":"public","archived":false,"lang":"","loc":0,"files":0,"stars":1,"pushed_at":"2026-02-25T21:54:24Z","audited":false,"tldr":"I posted some extensions on Chrome, but they could be better with less stringent rules & requirements that the web-store enforce. Those versions will live on here to do with as you wish ","version":"","audit_mode":"","has_audit_meta":false,"audit_url":"audit/Full-Power-Folders.html","audited_at":""}]};</script><script>
const DATA = window.__ATLAS__;
const $ = (sel, r = document) => r.querySelector(sel);
const $$ = (sel, r = document) => Array.from(r.querySelectorAll(sel));

const state = {
  query: '',
  tier: 'all',
  visibility: 'all',
  audited: 'all',
  language: 'all',
  sortKey: 'tier',
  sortDir: 'asc',
};

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function rowMatches(row) {
  if (state.tier !== 'all' && String(row.tier) !== state.tier) return false;
  if (state.visibility !== 'all' && row.visibility !== state.visibility) return false;
  if (state.audited === 'audited' && !row.audited) return false;
  if (state.audited === 'unaudited' && row.audited) return false;
  if (state.language !== 'all' && row.lang !== state.language) return false;
  if (state.query) {
    const q = state.query.toLowerCase();
    const hay = `${row.name} ${row.tldr} ${row.lang}`.toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function compareRows(a, b) {
  const k = state.sortKey;
  let av = a[k];
  let bv = b[k];
  if (k === 'pushed_at') {
    av = av || '';
    bv = bv || '';
  }
  if (typeof av === 'string' && typeof bv === 'string') {
    return state.sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
  }
  av = av == null ? 0 : av;
  bv = bv == null ? 0 : bv;
  return state.sortDir === 'asc' ? av - bv : bv - av;
}

function fmt(n) { return (typeof n === 'number' ? n.toLocaleString() : (n || '—')); }
function shortDate(s) { return (s || '').slice(0, 10) || '—'; }

function buildRow(r) {
  const tr = document.createElement('tr');
  tr.addEventListener('click', () => { location.href = r.audit_url; });

  const tierTd = document.createElement('td');
  const tierSpan = document.createElement('span');
  tierSpan.className = `tier-badge tier-${r.tier}`;
  tierSpan.textContent = `T${r.tier}`;
  tierTd.appendChild(tierSpan);

  const nameTd = document.createElement('td');
  const a = document.createElement('a');
  a.href = r.audit_url;
  a.addEventListener('click', e => e.stopPropagation());
  const strong = document.createElement('strong');
  strong.textContent = r.name;
  a.appendChild(strong);
  nameTd.appendChild(a);
  if (r.archived) {
    const ab = document.createElement('span');
    ab.className = 'archived-badge';
    ab.textContent = 'archived';
    ab.style.marginLeft = '6px';
    nameTd.appendChild(ab);
  }
  if (!r.audited) {
    const ub = document.createElement('span');
    ub.className = 'archived-badge';
    ub.textContent = 'unaudited';
    ub.style.background = 'rgba(224,168,54,0.2)';
    ub.style.color = '#8b6212';
    ub.style.marginLeft = '6px';
    nameTd.appendChild(ub);
  }
  if (r.tldr) {
    const sub = document.createElement('div');
    sub.style.fontSize = '11.5px';
    sub.style.color = 'var(--ls-text-soft)';
    sub.style.marginTop = '2px';
    sub.textContent = r.tldr.length > 110 ? r.tldr.slice(0, 110) + '…' : r.tldr;
    nameTd.appendChild(sub);
  }

  const langTd = document.createElement('td');
  langTd.textContent = r.lang || '—';

  const locTd = document.createElement('td');
  locTd.className = 'num';
  locTd.textContent = fmt(r.loc);

  const dateTd = document.createElement('td');
  dateTd.textContent = shortDate(r.pushed_at);

  const visTd = document.createElement('td');
  const vis = document.createElement('span');
  vis.className = 'visibility-badge';
  vis.textContent = r.visibility;
  visTd.appendChild(vis);

  const starsTd = document.createElement('td');
  starsTd.className = 'num';
  starsTd.textContent = String(r.stars || 0);

  tr.appendChild(tierTd);
  tr.appendChild(nameTd);
  tr.appendChild(langTd);
  tr.appendChild(locTd);
  tr.appendChild(dateTd);
  tr.appendChild(visTd);
  tr.appendChild(starsTd);
  return tr;
}

function render() {
  const rows = DATA.rows.filter(rowMatches);
  rows.sort(compareRows);
  const tbody = $('#repo-rows');
  tbody.replaceChildren();
  if (!rows.length) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = 7;
    td.style.textAlign = 'center';
    td.style.color = 'var(--ls-text-soft)';
    td.textContent = 'no matches';
    tr.appendChild(td);
    tbody.appendChild(tr);
  } else {
    const frag = document.createDocumentFragment();
    rows.forEach(r => frag.appendChild(buildRow(r)));
    tbody.appendChild(frag);
  }
  $('#row-count').textContent = `${rows.length} of ${DATA.rows.length}`;
}

function bindFilters() {
  $('#search').addEventListener('input', e => { state.query = e.target.value; render(); });
  const langSel = $('#lang-select');
  if (langSel) {
    langSel.addEventListener('change', e => { state.language = e.target.value; render(); });
  }
  $$('.filter-pills').forEach(group => {
    group.addEventListener('click', e => {
      if (e.target.tagName !== 'BUTTON') return;
      const key = group.dataset.key;
      const val = e.target.dataset.value;
      state[key] = val;
      $$('button', group).forEach(b => b.classList.toggle('on', b.dataset.value === val));
      render();
    });
  });
  $$('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const k = th.dataset.sort;
      if (state.sortKey === k) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
      else { state.sortKey = k; state.sortDir = 'asc'; }
      $$('th[data-sort]').forEach(h => h.classList.remove('sorted-asc', 'sorted-desc'));
      th.classList.add(state.sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
      render();
    });
  });
}

document.addEventListener('DOMContentLoaded', () => {
  bindFilters();
  render();
});
</script><script>
const themeSel = document.getElementById('theme-select');
if (themeSel) {
  const saved = localStorage.getItem('ls-atlas-theme') || 'retro';
  themeSel.value = saved;
  if (saved !== 'retro') document.documentElement.dataset.theme = saved;
  themeSel.addEventListener('change', () => {
    const t = themeSel.value;
    if (t === 'retro') delete document.documentElement.dataset.theme;
    else document.documentElement.dataset.theme = t;
    localStorage.setItem('ls-atlas-theme', t);
  });
}
</script></body></html>
